apiVersion: cloudsql.cloud.google.com/v1alpha1
kind: AuthProxyWorkload
metadata:
  name: webapi-proxy
  namespace: "commerce"
spec:
  # This controls the proxy on
  # the v1/Deployment labeled app=webapi
  workload:
    kind: Deployment.apps
    selector: # A LabelSelector
      matchLabels:
        app: "webapi"
  # Declares how the proxy connects to google drive
  authentication:
    gcloudAuth: true # this is the default
  # Proxy container configuration
  proxyContainer:
    # Resource requests for the proxy container
    resources:
      requests:
        cpu: 0.5
        mem: 2Gi
      limits:
        cpu: 1.0
        mem: 4Gi
    # The container image to use in the proxy container
    image: "gcr.io/cloudsql/proxy:2.1"
    # Used for testing only.
    sqlAdminEndpointUrl: "https://cloud.google.com/sqladmin/v2beta1"
    # K8s Container spec for the proxy, overrides all other setting
    container: {}
    # Proxy container telemetry settings, matching the CLI telemetry settings
    telemetry:
      quotaProject: "project-id"
      prometheus: true
      prometheusNamespace: "commerce.proxy"
      telemetryProject: "project-id"
      telemetryPrefix: "commerce_db_proxy"
      telemetrySampleRate: 15
      httpPort: 9009 # Overrides the default http port so that you can use this
      # an external monitoring tool like Prometheus can connect
      disableMetrics: true # Default false
      disableTraces: true # Default false
    # The max number of connections allowed, sets --max-connections
    maxConnections: 10
    # The max delay for connections to close before forcing them closed, sets --max-sigterm-delay
    maxSigtermDelay: 15
    # The mount path for fuse filesystem, sets --fuse
    fuseDir: "/mnt/db/fuse"
    # The mount path for fuse temp dir, sets --fuse-tmp-dir
    fuseTempDir: "/mnt/db/fuse-tmp"
  # Proxy container instances
  instances:
    # instance connection to product_catalog via TCP port
    - connectionString: "commerce:commercedb:product_catalog"
      # Set environment variables on all containers in this workload with connection
      # information for this instance. The other containers in the workload's PodSpec
      # will have environment variables added containing the value of the
      # tcp host and port or unix path. The application should read these
      # environment variables to connect to the database.
      portEnvName: PRODUCT_DB_PORT # The tcp port on this proxy for the instance
      hostEnvName: PRODUCT_DB_HOST # The tcp hostname always 127.0.0.1
    # instance connection to order_processing
    - connectionString: "commerce:commercedb:order_processing"
      autoIAMAuthn: true
      unixSocketPathEnvName: PRODUCT_DB_SOCKET
      unixSocketPath: "/mnt/db/order_processing"
      portEnvName: ORDER_DB_PORT
      hostEnvName: ORDER_DB_HOST
    # instance connection to crm customers using a fixed port, private ip, and
    # IAM AuthN
    - connectionString: "crm:crmdb:customers"
      port: 4433
      autoIAMAuthN: true
      privateIP: true
status:
  conditions:
    - type: "UpToDate"
      status: "True"
      observedGeneration: 1
      lastTransitionTime: "2022-01-02T15:04:05+00:00"
      reason: "WorkloadUpToDate"
  workloadStatus:
    - kind: Deployment
      version: apps/v1
      name: "webapi-frontend"
      namespace: "webapi-proxy"
      conditions:
        - type: "WorkloadUpToDate"
          status: "True"
          observedGeneration: 1
          lastTransitionTime: "2022-01-02T15:04:05+00:00"
          reason: "UpToDate"
